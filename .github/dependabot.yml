version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    # Ignore version update PRs - security updates remain active
    open-pull-requests-limit: 0
    exclude-paths:
      - "examples/**"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/ui"
    # Ignore version update PRs - security updates remain active
    open-pull-requests-limit: 0
    schedule:
      interval: "weekly"
